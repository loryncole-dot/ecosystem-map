<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<!-- v2.4 — Niche brand -->
<title>Enrollment Ecosystem Map</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Oswald:wght@500;600;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  /* ======================================================
     Niche brand tokens
     ====================================================== */
  :root {
    --niche-white: #FFFFFF;
    --niche-cream: #F3E9E3;
    --niche-cream-soft: #FAF4F0;
    --niche-cream-edge: #E5DCD5;
    --niche-dark-green: #003024;
    --niche-dark-green-soft: #1A4A3E;
    --niche-bright-green: #00BE76;
    --niche-medium-green: #016853;
    --niche-amber: #FF9B00;
    --niche-copper: #A97332;
    --niche-pink: #FF90E7;
    --niche-periwinkle: #8CA6FF;
    --niche-red-orange: #FF5B00;

    /* Tints used for soft fills (maturity chips, quote cards, highlights) */
    --niche-amber-tint: #FFE9C7;
    --niche-bright-green-tint: #C8F1DD;
    --niche-periwinkle-tint: #DEE5FF;
    --niche-pink-tint: #FFE0F8;

    --niche-font-display: "Fraunces", Georgia, serif;
    --niche-font-section: "Oswald", "Arial Narrow", sans-serif;
    --niche-font-body:    "Source Sans 3", "Source Sans Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: var(--niche-font-body); color: var(--niche-dark-green); background: var(--niche-cream); }
  #app { display: grid; grid-template-columns: 280px 1fr 380px; grid-template-rows: 56px 1fr; height: 100vh; }
  header {
    grid-column: 1 / -1;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    background: var(--niche-white); border-bottom: 1px solid var(--niche-cream-edge);
    z-index: 5;
  }
  header h1 {
    font-family: var(--niche-font-display);
    font-size: 22px; font-weight: 600; letter-spacing: -0.01em;
    color: var(--niche-dark-green);
  }
  header .subtitle {
    font-family: var(--niche-font-section); text-transform: uppercase;
    font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
    color: var(--niche-medium-green); margin-left: 14px;
  }
  header .search { display: flex; align-items: center; gap: 8px; }
  header .search input {
    font-family: var(--niche-font-body);
    border: 1px solid var(--niche-cream-edge); border-radius: 6px; padding: 6px 10px; font-size: 13px;
    width: 220px; outline: none; color: var(--niche-dark-green); background: var(--niche-white);
  }
  header .search input:focus { border-color: var(--niche-bright-green); box-shadow: 0 0 0 3px rgba(0,190,118,0.18); }
  aside.controls {
    background: var(--niche-white); border-right: 1px solid var(--niche-cream-edge);
    padding: 18px 16px; overflow-y: auto;
  }
  aside.details {
    background: var(--niche-white); border-left: 1px solid var(--niche-cream-edge);
    padding: 18px 16px; overflow-y: auto;
  }
  .control-group { margin-bottom: 22px; }
  .control-group h3 {
    font-family: var(--niche-font-section);
    font-size: 13px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--niche-medium-green); margin-bottom: 10px;
  }
  .segmented {
    display: flex; border: 1px solid var(--niche-cream-edge); border-radius: 8px; overflow: hidden;
    background: var(--niche-cream-soft);
  }
  .segmented button {
    font-family: var(--niche-font-section); text-transform: uppercase; letter-spacing: 0.06em;
    flex: 1; padding: 7px 8px; font-size: 12px; border: none; background: transparent;
    cursor: pointer; color: var(--niche-medium-green); font-weight: 600;
    transition: background 0.15s, color 0.15s;
  }
  .segmented button:hover { background: var(--niche-cream); }
  /* Low=amber, Medium=bright green, High=periwinkle — Niche accents */
  .segmented button[data-maturity="low"].active   { background: var(--niche-amber-tint);         color: var(--niche-dark-green); }
  .segmented button[data-maturity="medium"].active{ background: var(--niche-bright-green-tint);  color: var(--niche-dark-green); }
  .segmented button[data-maturity="high"].active  { background: var(--niche-periwinkle-tint);    color: var(--niche-dark-green); }
  .maturity-desc {
    margin-top: 10px; font-size: 12px; color: var(--niche-dark-green); line-height: 1.5;
    background: var(--niche-cream); padding: 10px 12px; border-radius: 6px; border: 1px solid var(--niche-cream-edge);
  }
  .filter-row {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 8px; border-radius: 6px; cursor: pointer;
    font-size: 13px; color: var(--niche-dark-green);
  }
  .filter-row:hover { background: var(--niche-cream-soft); }
  .filter-row .swatch {
    width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid transparent;
  }
  .filter-row input { accent-color: var(--niche-bright-green); }
  .ring-row { cursor: pointer; }
  .ring-row input[type="radio"] { accent-color: var(--niche-bright-green); cursor: pointer; }
  .legend-line { display: flex; align-items: center; gap: 10px; font-size: 12px; padding: 4px 0; color: var(--niche-dark-green); }
  .legend-line .line-sample { width: 36px; height: 2px; background: var(--niche-medium-green); }
  .legend-line .line-sample.dashed { background: repeating-linear-gradient(to right, var(--niche-medium-green) 0 4px, transparent 4px 8px); height: 2px; }
  .legend-line .line-sample.dotted { background: repeating-linear-gradient(to right, var(--niche-medium-green) 0 2px, transparent 2px 5px); height: 2px; }
  main.viz {
    position: relative; overflow: hidden; background: var(--niche-cream);
  }
  #viz { width: 100%; height: 100%; display: block; cursor: grab; }
  #viz:active { cursor: grabbing; }
  .zoom-controls {
    position: absolute; top: 16px; right: 16px;
    display: flex; flex-direction: column; gap: 4px;
    background: var(--niche-white); border: 1px solid var(--niche-cream-edge); border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,48,36,0.08);
    overflow: hidden;
  }
  .zoom-controls button {
    width: 36px; height: 36px; border: none; background: var(--niche-white);
    font-size: 16px; cursor: pointer; color: var(--niche-dark-green);
    border-bottom: 1px solid var(--niche-cream-edge);
  }
  .zoom-controls button:last-child { border-bottom: none; }
  .zoom-controls button:hover { background: var(--niche-cream-soft); }
  .tooltip {
    position: absolute; pointer-events: none;
    font-family: var(--niche-font-body);
    background: var(--niche-dark-green); color: var(--niche-cream); font-size: 12px;
    padding: 6px 10px; border-radius: 5px; z-index: 10;
    opacity: 0; transition: opacity 0.15s;
    max-width: 220px; box-shadow: 0 2px 8px rgba(0,48,36,0.25);
  }
  .tooltip.visible { opacity: 1; }
  .stage-btn {
    font-family: var(--niche-font-body);
    width: 100%; padding: 8px 10px; border: 1px solid var(--niche-cream-edge); border-radius: 6px;
    background: var(--niche-white); font-size: 12px; color: var(--niche-dark-green); cursor: pointer;
    text-align: left; margin-bottom: 4px; display: flex; align-items: center; gap: 8px;
  }
  .stage-btn:hover { background: var(--niche-cream-soft); }
  .stage-btn.active { background: var(--niche-cream); border-color: var(--niche-medium-green); color: var(--niche-dark-green); font-weight: 600; }
  .stage-btn .dot { display: none; }
  .details-card { font-size: 13px; color: var(--niche-dark-green); line-height: 1.5; }
  .details-card h2 {
    font-family: var(--niche-font-display);
    font-size: 20px; font-weight: 600; color: var(--niche-dark-green); margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .details-card .meta {
    font-family: var(--niche-font-section);
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--niche-medium-green); margin-bottom: 14px; font-weight: 500;
  }
  .details-card .section-title {
    font-family: var(--niche-font-section);
    font-size: 12px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--niche-medium-green);
    margin-top: 14px; margin-bottom: 6px;
  }
  .details-card ul { list-style: none; }
  .details-card ul li {
    padding: 5px 0; font-size: 13px; border-bottom: 1px solid var(--niche-cream);
    gap: 4px; color: var(--niche-dark-green);
  }
  .details-card ul li .edge-label { font-size: 11px; color: var(--niche-medium-green); font-style: italic; }
  .empty-state { color: var(--niche-medium-green); font-size: 13px; font-style: italic; }
  /* Description text - no box */
  .node-description {
    font-size: 13px; color: var(--niche-dark-green); line-height: 1.6;
    margin-bottom: 2px;
  }
  /* Quote cards — Niche accent palette */
  .quote-card {
    margin-top: 8px; border-radius: 6px; padding: 10px 12px;
    border-left: 3px solid;
    font-size: 12px; line-height: 1.6; color: var(--niche-dark-green);
    font-style: italic;
  }
  .quote-card.low    { background: var(--niche-amber-tint);        border-color: var(--niche-amber); }
  .quote-card.medium { background: var(--niche-bright-green-tint); border-color: var(--niche-bright-green); }
  .quote-card.high   { background: var(--niche-periwinkle-tint);   border-color: var(--niche-periwinkle); }
  .quote-tag { display: none; }
  .quote-text { white-space: pre-wrap; }
  /* Expandable connections */
  .conn-toggle {
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none;
    font-family: var(--niche-font-section);
    font-size: 12px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--niche-medium-green);
    margin-top: 14px; margin-bottom: 0; padding: 4px 0;
    border-top: 1px solid var(--niche-cream);
  }
  .conn-toggle:hover { color: var(--niche-dark-green); }
  .conn-toggle .caret { font-size: 10px; transition: transform 0.2s; }
  .conn-toggle.open .caret { transform: rotate(90deg); }
  .conn-list { display: none; }
  .conn-list.open { display: block; }
  .reset-btn {
    font-family: var(--niche-font-section); text-transform: uppercase; letter-spacing: 0.06em;
    width: 100%; padding: 8px 12px; border: 1px solid var(--niche-bright-green); border-radius: 6px;
    background: var(--niche-bright-green); font-size: 12px; color: var(--niche-white); cursor: pointer; font-weight: 600;
  }
  .reset-btn:hover { background: var(--niche-medium-green); border-color: var(--niche-medium-green); }
  /* SVG styling — Niche brand */
  .ring-bg { fill-opacity: 1; stroke: var(--niche-medium-green); stroke-width: 6; }
  .ring-bg.highlight { stroke: var(--niche-bright-green); stroke-width: 14; fill: var(--niche-bright-green-tint); fill-opacity: 1; }
  .ring-bg.dim { fill-opacity: 0.4; }
  .ring-label {
    font-family: var(--niche-font-section); text-transform: uppercase;
    fill: var(--niche-medium-green); font-size: 115px; font-weight: 600; letter-spacing: 0.08em;
    paint-order: stroke; stroke: var(--niche-cream); stroke-width: 8; stroke-linejoin: round;
  }
  .quadrant-label {
    font-family: var(--niche-font-display);
    fill: var(--niche-dark-green); font-size: 120px; font-weight: 700; letter-spacing: -0.01em;
    cursor: pointer; opacity: 1;
    paint-order: stroke; stroke: var(--niche-cream); stroke-width: 6; stroke-linejoin: round;
    transition: opacity 0.15s;
  }
  .quadrant-label:hover { opacity: 0.75; }
  .quadrant-label.active { paint-order: stroke; stroke: var(--niche-cream); stroke-width: 10; }
  .journey-arc  { fill: none; stroke: var(--niche-periwinkle); stroke-width: 8; opacity: 0.6; }
  .journey-arrow { fill: var(--niche-periwinkle); opacity: 0.7; }
  .node circle {
    stroke: var(--niche-white); stroke-width: 5; cursor: pointer;
    transition: stroke-width 0.15s, r 0.15s, filter 0.15s;
  }
  .node circle:hover { stroke: var(--niche-dark-green); stroke-width: 7; }
  .node.highlight circle { stroke: var(--niche-bright-green); stroke-width: 9; filter: drop-shadow(0 4px 14px rgba(0,190,118,0.55)); }
  .node.dim { opacity: 0.15; }
  .node.hidden { display: none; }
  .node text {
    font-family: var(--niche-font-body);
    font-size: 30px; pointer-events: none; fill: var(--niche-dark-green);
    text-anchor: middle; font-weight: 600; letter-spacing: -0.01em;
  }
  .node.highlight text { fill: var(--niche-dark-green); font-weight: 700; }
  .edge {
    fill: none; opacity: 0.35;
    transition: opacity 0.15s, stroke-width 0.15s;
  }
  .edge.direct     { stroke-width: 3; }
  .edge.automated  { stroke-width: 7; stroke-linecap: round; }
  .edge.indirect   { stroke-width: 2.5; }
  .edge.highlight.direct     { stroke-width: 5; }
  .edge.highlight.automated  { stroke-width: 10; }
  .edge.highlight.indirect   { stroke-width: 4; }
  .edge.highlight { opacity: 1; }
  .edge.dim { opacity: 0.04; }
  .edge.hidden { display: none; }
  .edge-label {
    font-family: var(--niche-font-body);
    font-size: 26px; fill: var(--niche-dark-green); pointer-events: none; opacity: 0;
    transition: opacity 0.15s;
    text-anchor: middle; font-weight: 600;
    paint-order: stroke; stroke: var(--niche-cream); stroke-width: 8; stroke-linejoin: round;
  }
  .edge-label.visible { opacity: 1; }
  .stage-highlight {
    fill-opacity: 0.5; pointer-events: none;
  }
  .ribbon-path {
    cursor: pointer;
    transition: fill-opacity 0.2s, stroke-width 0.2s;
    stroke: var(--niche-medium-green); stroke-width: 3;
  }
  .ribbon-path:hover { fill-opacity: 0.65 !important; stroke-width: 6; }
  .ribbon-path.highlight { fill-opacity: 0.7 !important; stroke-width: 8; filter: drop-shadow(0 4px 14px rgba(1,104,83,0.45)); }
  .ribbon-path.dim { fill-opacity: 0.08 !important; }
  .ribbon-label {
    font-family: var(--niche-font-display);
    font-size: 76px; font-weight: 600; fill: var(--niche-dark-green);
    font-style: italic; letter-spacing: 0.01em; pointer-events: none;
  }
  .ribbon-sublabel {
    font-family: var(--niche-font-body);
    font-size: 26px; font-weight: 600; fill: var(--niche-dark-green);
    pointer-events: none;
  }
  .ribbon-cycle-label {
    font-family: var(--niche-font-section);
    font-size: 44px; font-weight: 600; fill: var(--niche-dark-green);
    letter-spacing: 0.10em; pointer-events: none; text-transform: uppercase;
  }
  /* scrollbar */
  aside::-webkit-scrollbar { width: 6px; }
  aside::-webkit-scrollbar-thumb { background: var(--niche-cream-edge); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div style="display: flex; align-items: baseline;">
      <h1>Enrollment Ecosystem Map</h1>
      <span class="subtitle">IPE Segmentation · Task Analysis</span>
    </div>
    <div class="search">
      <input type="text" id="search" placeholder="Search nodes…" />
      <button class="reset-btn" style="width: auto;" id="reset-all">Reset view</button>
    </div>
  </header>

  <aside class="controls">
    <div class="control-group">
      <h3>Organizational Maturity</h3>
      <div class="segmented" id="maturity-seg">
        <button data-maturity="low">Low</button>
        <button data-maturity="medium" class="active">Medium</button>
        <button data-maturity="high">High</button>
      </div>
      <div class="maturity-desc" id="maturity-desc"></div>
    </div>

    <div class="control-group">
      <h3>Journey Stage</h3>
      <button class="stage-btn" data-stage="Prospect">
        <span class="dot" style="background: var(--niche-amber)"></span> Prospect
      </button>
      <button class="stage-btn" data-stage="Applied">
        <span class="dot" style="background: var(--niche-bright-green)"></span> Applied
      </button>
      <button class="stage-btn" data-stage="Admitted">
        <span class="dot" style="background: var(--niche-periwinkle)"></span> Admitted
      </button>
      <button class="stage-btn" data-stage="Attending">
        <span class="dot" style="background: var(--niche-pink)"></span> Attending
      </button>
    </div>

    <div class="control-group">
      <h3>Rings</h3>
      <div id="ring-list"></div>
    </div>

    <div class="control-group">
      <h3>Node Types</h3>
      <label class="filter-row">
        <input type="checkbox" data-type="person" checked>
        <span class="swatch" style="background: var(--niche-periwinkle)"></span>
        <span>Person / Team</span>
      </label>
      <label class="filter-row">
        <input type="checkbox" data-type="system" checked>
        <span class="swatch" style="background: var(--niche-amber)"></span>
        <span>System</span>
      </label>
      <label class="filter-row">
        <input type="checkbox" data-type="touchpoint" checked>
        <span class="swatch" style="background: var(--niche-pink)"></span>
        <span>Touchpoint</span>
      </label>
    </div>

    <div class="control-group">
      <h3>Connection Legend</h3>
      <div class="legend-line">
        <span class="line-sample"></span>
        <span>Direct / explicit</span>
      </div>
      <div class="legend-line">
        <span class="line-sample dashed"></span>
        <span>Automated</span>
      </div>
      <div class="legend-line">
        <span class="line-sample dotted"></span>
        <span>Indirect / ongoing</span>
      </div>
    </div>
  </aside>

  <main class="viz">
    <svg id="viz"></svg>
    <div class="zoom-controls">
      <button id="zoom-in" title="Zoom in">+</button>
      <button id="zoom-out" title="Zoom out">−</button>
      <button id="zoom-reset" title="Fit to view">⟲</button>
    </div>
    <div class="tooltip" id="tooltip"></div>
  </main>

  <aside class="details">
    <div id="details-content" class="details-card">
      <div class="empty-state">
        Click a node or ring to see its connections. Scroll to zoom, drag to pan.
      </div>
    </div>
  </aside>
</div>

<script>
const FIGJAM_CENTER = { x: 5827, y: 4888 };
const RINGS = [
  { id: 0, name: "Admissions office",   radius: 854,  color: "#ffffff" },
  { id: 1, name: "University",          radius: 1736, color: "#ffffff" },
  { id: 2, name: "Third parties",       radius: 2904, color: "#ffffff" },
  { id: 3, name: "Students / Parents",  radius: 3933, color: "#ffffff" }
];

const TYPE_COLOR = {
  person:      "#8CA6FF", // Niche Periwinkle
  system:      "#FF9B00", // Niche Amber
  touchpoint:  "#FF90E7"  // Niche Pink
};

// FigJam coordinates (x,y are top-left; we compute center)
// ring: 0=Admissions, 1=University, 2=Third parties, 3=Students/Parents
const NODES_RAW = [
  // --- Admissions office (Ring 0) ---
  { id: "enrollment_staff",   label: "Enrollment\nStaff",      ring: 0, type: "person", x: 5947, y: 5205, r: 128, func: "counselors",     maturity: ["low","medium","high"] },
  { id: "crm_admin",          label: "CRM admin",              ring: 0, type: "person", x: 5211, y: 4459, r: 128, func: "crm",            maturity: ["medium"] },
  { id: "enrollment_leaders", label: "Enrollment\nLeaders",    ring: 0, type: "person", x: 5648, y: 4352, r: 128, func: "leadership",     maturity: ["low","medium","high"] },
  { id: "crm",                label: "CRM",                    ring: 0, type: "system", x: 5662, y: 4764, r: 114, func: "crm",            maturity: ["low","medium","high"] },
  { id: "ops_team",           label: "Enrollment\nOps Team",   ring: 0, type: "person", x: 6300, y: 4600, r: 128, func: "crm",            maturity: ["high"] },
  { id: "events_team",        label: "Events &\nVisits Team",  ring: 0, type: "person", x: 6350, y: 4980, r: 128, func: "events",         maturity: ["medium","high"] },
  { id: "comms_team",         label: "Enrollment\nComms Team", ring: 0, type: "person", x: 5400, y: 5150, r: 128, func: "communications", maturity: ["high"] },

  // --- University (Ring 1) ---
  { id: "sis",                 label: "Student Info\nSystem",        ring: 1, type: "system", x: 4745, y: 5742, r: 114, func: "crm",            maturity: ["low","medium","high"] },
  { id: "housing_system",      label: "Housing\nsystem",             ring: 1, type: "system", x: 4395, y: 4774, r: 114, func: "crm",            maturity: ["low","medium","high"] },
  { id: "university_mktg",     label: "University\nMarketing Team",  ring: 1, type: "person", x: 6425, y: 3680, r: 128, func: "communications", maturity: ["low","medium","high"] },
  { id: "university_leader",   label: "University\nleadership",      ring: 1, type: "person", x: 5269, y: 3648, r: 128, func: "leadership",     maturity: ["low","medium","high"] },
  { id: "financial_aid",       label: "Financial\nAid Team",         ring: 1, type: "person", x: 6363, y: 5872, r: 128, func: "enrollment",     maturity: ["low","medium","high"] },
  { id: "orientation_team",    label: "Student /\nCampus Life",      ring: 1, type: "person", x: 4623, y: 3952, r: 128, func: "events",         maturity: ["low","medium","high"] },

const NODE_DESCRIPTIONS = {
  "crm": "The CRM is the center of gravity for enrollment processes, holding the prospect-to-applicant-to-admit funnel and automatically syncing with other key school systems. Slate is by far the most common CRM. Low-technical maturity schools may use other CRMs, including Element451, Salesforce TargetX, and Ellucian Recruit, but they tend to find those CRMs may limit their ability to use vendors or integrate tools.",
  "enrollment_leaders": "Enrollment Leaders set strategy, own the enrollment funnel, and coordinate with university leadership on class composition, financial aid leveraging, and vendor investment. At smaller, low-maturity offices they wear every hat (including CRM admin and ops); at high-maturity offices they oversee dedicated ops, events, and comms teams.",
  "enrollment_staff": "Admissions counselors are the front line of the enrollment office — they run outreach, own territories, travel to high schools, meet prospects, and drive yield through personalized contact.",
  "ops_team": "A dedicated Enrollment Ops team handles CRM administration, data integrity, reporting, and system integrations. In some organizations, this might be the same team that handles events or enrollment processing (e.g. Florida State University).",
  "events_team": "Events and visits staff runs college fairs, on-campus events, admitted-student days, and the visitor center experience. They may also coordinate visit planning for off-campus high schools and college fairs. At medium-maturity schools, this may be just one or two staff-level employees who depend on admissions counselors to execute events.",
  "comms_team": "Dedicated Enrollment Comms team that owns campaigns, content, enrollment-specific website messaging, and the overall communications calendar. In some schools, the enrollment teams and marketing teams may report into the same VP, and in those cases the university marketing team may also act as this dedicated enrollment comms team.",
  "crm_admin": "The CRM admin is a dedicated staff-level specialist who is responsible for maintaining the CRM (including setting up integrations), and facilitating reporting out of the CRM.",
  "strategic_vendor": "Strategic vendors (EAB, RNL, Carnegie, Halda, Liaison, consulting firms) provide predictive modeling, benchmarking, and consultative strategy. They may also handle top-of-funnel prospecting and lead nurturing.",
  "lead_sources": "Lead sources are the third-party platforms where admissions purchases names — Niche, College Board, Encoura, Common App, Cappex, ZeeMe, EAB, and RNL were all named. Leads are either automatically synced to the CRM or manually processed and uploaded by a CRM admin.",
  "direct_admissions": "Direct admissions tools (e.g., Niche Direct Admissions, Common App Direct) pre-admit students based on academic profile, and are typically synced with the CRM.",
  "student_engagement": "Student engagement platforms (e.g., CollegeVine's Mia, chatbots, AI assistants) automate top-of-funnel engagement and drip campaigns.",
  "college_search": "College search platforms are where students research and discover schools; Niche sits primarily in this layer for high school audiences. Interviewees are wary of rankings-driven signals (especially selectivity-heavy methodologies) that don't reflect access-oriented institutions.",
  "university_website": "The university website is a primary top-of-funnel conversion surface, feeding inquiries and applications back into the CRM. The website is usually owned by university marketing, with enrollment offices requesting changes as needed.",
  "social_media": "Social media is a key research channel for students exploring colleges and specific campuses. Ownership varies by school size — smaller offices often rely entirely on central marketing, while larger offices may have dedicated social staff.",
  "financial_aid": "The Financial Aid team packages aid, handles FAFSA processing, and is one of the most critical cross-campus collaborators for admissions — especially as students become more price-sensitive. Several interviewees described their collaboration with the financial aid team as fluid and ongoing.",

// Prepare runtime data (normalize around center)
function buildRuntimeData() {
  const nodes = NODES_RAW.map(n => ({
    ...n,
    cx: n.x + n.r - FIGJAM_CENTER.x,
    cy: n.y + n.r - FIGJAM_CENTER.y
  }));
  const edges = EDGES_RAW.map((e, i) => ({
    id: "e" + i,
    source: e.s,
    target: e.t,
    label: e.label || "",
    style: e.style || "direct",
    bidirectional: !!e.bi,
    reverse: !!e.reverse,
    maturity: e.maturity || ["low","medium","high"]
  }));
  return { nodes, edges };
}

function screenToD3Angle(deg) {
  // screen atan2 convention (0=right, -90=up, +90=down) → d3 arc (0=up, clockwise +)
  return (deg + 90) * Math.PI / 180;
}
function ribbonMidpoint(rib) {
  const midScreenDeg = (rib.startScreenAngle + rib.endScreenAngle) / 2;
  const midR = (rib.innerRadius + rib.outerRadius) / 2;
  const rad = midScreenDeg * Math.PI / 180;
  return { cx: Math.cos(rad) * midR, cy: Math.sin(rad) * midR };
}
// Anchor point on the ribbon closest to a given (cx,cy) source — used for edge routing.
function ribbonAnchorFor(rib, srcX, srcY) {
  const srcAngle = Math.atan2(srcY, srcX) * 180 / Math.PI; // screen deg
  // Clamp to ribbon's angular span
  let a = srcAngle;
  const lo = Math.min(rib.startScreenAngle, rib.endScreenAngle);
  const hi = Math.max(rib.startScreenAngle, rib.endScreenAngle);
  if (a < lo) a = lo;
  if (a > hi) a = hi;
  const midR = (rib.innerRadius + rib.outerRadius) / 2;
  const rad = a * Math.PI / 180;
  return { cx: Math.cos(rad) * midR, cy: Math.sin(rad) * midR };
}

// --- Draw ribbons
const ribbonSels = ribbonsLayer.selectAll("path.ribbon-path")
  .data(RIBBONS, d => d.id)
  .enter()
  .append("path")
  .attr("class", "ribbon-path")
  .attr("fill", d => d.color)
  .attr("fill-opacity", d => d.opacity)
  .attr("d", d => {
    const arcGen = d3.arc()
      .innerRadius(d.innerRadius)
      .outerRadius(d.outerRadius)
      .startAngle(screenToD3Angle(d.startScreenAngle))
      .endAngle(screenToD3Angle(d.endScreenAngle));
    return arcGen();
  })
  .on("click", (e, d) => { onRibbonClick(d.id); e.stopPropagation(); })
  .on("mouseover", (e, d) => showTooltip(e, d.label + " — " + d.subLabel))
  .on("mouseout", hideTooltip);

// --- Ribbon labels: every label rides the ribbon's centerline arc so they sit
// inside the band. The main label and the cycle labels share the same midline
// path but are placed at different startOffsets.
RIBBONS.forEach((rib, idx) => {
  const startDeg = rib.startScreenAngle;
  const endDeg = rib.endScreenAngle;
  const totalSpan = endDeg - startDeg; // degrees the ribbon covers
  const midR = (rib.innerRadius + rib.outerRadius) / 2;

  const makeArcPath = (r, fromDeg, toDeg) => {
    const a1 = fromDeg * Math.PI / 180;
    const a2 = toDeg * Math.PI / 180;
    const sx = Math.cos(a1) * r, sy = Math.sin(a1) * r;
    const ex = Math.cos(a2) * r, ey = Math.sin(a2) * r;
    const largeArc = Math.abs(toDeg - fromDeg) > 180 ? 1 : 0;
    const sweep = toDeg > fromDeg ? 1 : 0;
    return `M ${sx} ${sy} A ${r} ${r} 0 ${largeArc} ${sweep} ${ex} ${ey}`;
  };

  // One full-arc path along the ribbon's centerline, used by every label.
  const midPathId = "ribbon-midline-path-" + idx;
  defs.append("path").attr("id", midPathId).attr("d", makeArcPath(midR, startDeg, endDeg));

  // Helper: convert a screen angle on the ribbon to a startOffset percentage along
  // the midline path.
  const angleToOffset = (deg) => ((deg - startDeg) / totalSpan) * 100;

  // --- Main label "Direct outreach" — anchored to the START of the ribbon so
  //     the first letter sits just past the ribbon's starting edge.
  ribbonLabelsLayer.append("text")
    .attr("class", "ribbon-label")
    .attr("dominant-baseline", "central")
    .append("textPath")
    .attr("href", "#" + midPathId)
    .attr("startOffset", "1%")
    .attr("text-anchor", "start")
    .text(rib.label);

  // --- Cycle labels: each rides the ribbon's centerline.
  //     Labels on the BOTTOM half of the arc (sin θ > 0 in SVG screen coords)
  //     would render upside-down on the forward (clockwise) path. For those,
  //     we build a short COUNTERCLOCKWISE arc segment so the text reads
  //     right-side up while still curving inside the ribbon band.
  if (rib.cycleLabels && rib.cycleLabels.length) {
    rib.cycleLabels.forEach((cl, ci) => {
      const θ = cl.atScreenAngle;
      const isBottomHalf = Math.sin(θ * Math.PI / 180) > 0;

      if (isBottomHalf) {
        // Reverse arc segment, ±35° around θ, drawn CCW (sweep flag 0).
        const segStart = θ + 35;
        const segEnd   = θ - 35;
        const a1 = segStart * Math.PI / 180;
        const a2 = segEnd   * Math.PI / 180;
        const sx = Math.cos(a1) * midR, sy = Math.sin(a1) * midR;
        const ex = Math.cos(a2) * midR, ey = Math.sin(a2) * midR;
        const segPathId = "ribbon-cycle-rev-" + idx + "-" + ci;
        defs.append("path")
          .attr("id", segPathId)
          .attr("d", `M ${sx} ${sy} A ${midR} ${midR} 0 0 0 ${ex} ${ey}`);

        ribbonLabelsLayer.append("text")
          .attr("class", "ribbon-cycle-label")
          .attr("dominant-baseline", "central")
          .append("textPath")
          .attr("href", "#" + segPathId)
          .attr("startOffset", "50%")
          .attr("text-anchor", "middle")
          .text(cl.text);
      } else {
        // Top-half labels can ride the forward (clockwise) midline path.
        const offsetPct = angleToOffset(θ);
        ribbonLabelsLayer.append("text")
          .attr("class", "ribbon-cycle-label")
          .attr("dominant-baseline", "central")
          .append("textPath")
          .attr("href", "#" + midPathId)
          .attr("startOffset", offsetPct + "%")
          .attr("text-anchor", "middle")
          .text(cl.text);
      }
    });
  }
});

// --- Draw rings (outer to inner so inner is on top)
const ringsData = [...RINGS].reverse();
const ringSels = ringsLayer.selectAll("circle.ring-bg")
  .data(ringsData, d => d.id)
  .enter()
  .append("circle")
  .attr("class", "ring-bg")

// --- Ring labels
// Pin each label to a consistent 30-unit gap below the inside-top of its ring,
// using dominant-baseline="hanging" so the y attr defines the TOP of the text.
RINGS.forEach(r => {
  ringLabelsLayer.append("text")

// --- Stage quadrant labels (outside the rings)
const STAGES = [
  { name: "Prospect",  angle: -45,  color: "#FF9B00" }, // Niche Amber
  { name: "Applied",   angle: 45,   color: "#00BE76" }, // Niche Bright Green
  { name: "Admitted",  angle: 135,  color: "#8CA6FF" }, // Niche Periwinkle
  { name: "Attending", angle: -135, color: "#FF90E7" }  // Niche Pink
];
const OUTER_R = RINGS[3].radius + 400;
STAGES.forEach(s => {
  const rad = s.angle * Math.PI / 180;
  quadLayer.append("text")
    .attr("class", "quadrant-label")
    .attr("data-stage", s.name)
    .attr("x", Math.cos(rad) * OUTER_R)
    .attr("y", Math.sin(rad) * OUTER_R)
    .attr("text-anchor", "middle")
    .attr("dominant-baseline", "middle")
    .attr("fill", s.color)
    .text(s.name)
    .on("click", (e) => {
      e.stopPropagation();
      const next = (state.stage === s.name) ? "all" : s.name;
      setStage(next);
    })
    .on("mouseover", (e) => showTooltip(e, "Click to highlight the " + s.name + " stage"))
    .on("mouseout", hideTooltip);
});

// Journey arrows between stages (arc)
const arrowR = RINGS[3].radius + 220;
const arcGen = d3.arc().innerRadius(arrowR).outerRadius(arrowR+2);
[["Prospect","Applied"],["Applied","Admitted"],["Admitted","Attending"]].forEach(([from, to], i) => {
  const fromStage = STAGES.find(s => s.name === from);
  const toStage = STAGES.find(s => s.name === to);
  const a1 = fromStage.angle * Math.PI / 180;
  const a2 = toStage.angle * Math.PI / 180;
  // Create curved arrow
  const x1 = Math.cos(a1) * arrowR, y1 = Math.sin(a1) * arrowR;
  const x2 = Math.cos(a2) * arrowR, y2 = Math.sin(a2) * arrowR;
  const path = d3.path();
  path.moveTo(x1, y1);
  // Draw arc along circle
  const startA = Math.atan2(y1, x1);
  let endA = Math.atan2(y2, x2);
  // Ensure clockwise (normalize)
  if (endA < startA) endA += Math.PI * 2;
  const steps = 20;
  for (let j = 1; j <= steps; j++) {
    const t = j / steps;
    const a = startA + (endA - startA) * t;
    path.lineTo(Math.cos(a) * arrowR, Math.sin(a) * arrowR);
  }
  quadLayer.append("path")
    .attr("d", path.toString())
    .attr("class", "journey-arc")
    .attr("marker-end", "url(#arrow-0)");
});

// --- Edges
let edgeSel, edgeLabelSel, nodeSel;

function renderEdges(edges) {
  edgeSel = edgesLayer.selectAll("path.edge")
    .data(edges, d => d.id);
  edgeSel.exit().remove();
  const entering = edgeSel.enter().append("path")
    .attr("class", d => "edge " + d.style)
    .attr("stroke", "#016853") // Niche Medium Green
    .attr("fill", "none")
    .attr("marker-end", d => d.bidirectional ? "url(#arrow-0)" : (d.reverse ? null : "url(#arrow-0)"))
    .attr("marker-start", d => d.bidirectional ? "url(#arrow-0)" : (d.reverse ? "url(#arrow-0)" : null))
    .attr("stroke-dasharray", d => {
      // automated: wide-spaced round dots (caps-only segments)
      if (d.style === "automated") return "0 22";
      // indirect: short thin dashes
      if (d.style === "indirect")  return "10 8";
      return null;
    });
  edgeSel = entering.merge(edgeSel);

  // Resolve an endpoint id to an {cx,cy} position.
  // If ribbon endpoint, anchor is the point on the ribbon closest to the other endpoint's angle.
  function resolveEndpoints(edge) {
    const srcRib = RIBBON_MAP.get(edge.source);
    const tgtRib = RIBBON_MAP.get(edge.target);
    const sNode = NODE_MAP.get(edge.source);
    const tNode = NODE_MAP.get(edge.target);
    let s, t;
    if (srcRib && tNode) {
      s = ribbonAnchorFor(srcRib, tNode.cx, tNode.cy);
      t = tNode;
    } else if (tgtRib && sNode) {
      s = sNode;
      t = ribbonAnchorFor(tgtRib, sNode.cx, sNode.cy);
    } else if (sNode && tNode) {
      s = sNode; t = tNode;
    } else {
      return null;
    }
    return { s, t };
  }

  // Compute curve geometry once per edge; give each edge its own curve intensity
  // so parallel/overlapping edges fan out.
  function curveParams(d) {
    const pts = resolveEndpoints(d);
    if (!pts) return null;
    const { s, t } = pts;
    const dx = t.cx - s.cx, dy = t.cy - s.cy;
    const dist = Math.hypot(dx, dy) || 1;
    // Vary curve amount a bit per edge so overlapping edges separate.
    const hash = parseInt(d.id.slice(1)) || 0;
    const variant = ((hash % 5) - 2) * 0.04;   // -0.08 .. +0.08
    const curve = dist * (0.1 + variant);
    const mx = (s.cx + t.cx) / 2 - dy / dist * curve;
    const my = (s.cy + t.cy) / 2 + dx / dist * curve;
    return { s, t, mx, my, hash };
  }

  // Position
  edgeSel.attr("d", d => {
    const p = curveParams(d);
    if (!p) return "";
    return `M ${p.s.cx} ${p.s.cy} Q ${p.mx} ${p.my} ${p.t.cx} ${p.t.cy}`;
  });

  // Edge labels — sample the quadratic Bezier at a per-edge position (0.35..0.65)
  // so labels don't stack on top of each other when multiple edges share a node.
  function labelPoint(d) {
    const p = curveParams(d);
    if (!p) return { x: 0, y: 0 };
    const u = 0.35 + ((p.hash % 7) * 0.05);  // 0.35, 0.40, ... 0.65
    const omu = 1 - u;
    const bx = omu*omu*p.s.cx + 2*omu*u*p.mx + u*u*p.t.cx;
    const by = omu*omu*p.s.cy + 2*omu*u*p.my + u*u*p.t.cy;
    return { x: bx, y: by };
  }

  edgeLabelSel = edgeLabelsLayer.selectAll("text.edge-label")
    .data(edges.filter(e => e.label), d => d.id);
  edgeLabelSel.exit().remove();
  const lblEntering = edgeLabelSel.enter().append("text")
    .attr("class", "edge-label")
    .text(d => d.label);
  edgeLabelSel = lblEntering.merge(edgeLabelSel);
  edgeLabelSel
    .attr("x", d => labelPoint(d).x)
    .attr("y", d => labelPoint(d).y);
}

// --- Nodes
function renderNodes(nodes) {
  nodeSel = nodesLayer.selectAll("g.node")
    .data(nodes, d => d.id);
  nodeSel.exit().remove();
  const entering = nodeSel.enter().append("g")
    .attr("class", "node")
    .attr("transform", d => `translate(${d.cx},${d.cy})`)
    .on("click", (e, d) => { onNodeClick(d.id); e.stopPropagation(); })
    .on("mouseover", (e, d) => showTooltip(e, d.label.replace(/\n/g," ")))
    .on("mouseout", hideTooltip);
  entering.append("circle")
    .attr("r", d => d.r * 1.3)
    .attr("fill", d => TYPE_COLOR[d.type]);
  entering.append("text")
    .attr("dy", "0.35em")
    .selectAll("tspan")
    .data(d => d.label.split("\n").map((ln, i, arr) => ({ line: ln, i, total: arr.length })))
    .enter()
    .append("tspan")
    .attr("x", 0)
    .attr("dy", (d, i) => i === 0 ? `-${(d.total-1)*0.5}em` : "1em")
    .text(d => d.line);
  nodeSel = entering.merge(nodeSel);
  // Update text labels on merge (in case maturity relabel)
  nodeSel.select("text").selectAll("tspan").remove();
  nodeSel.select("text")
    .selectAll("tspan")
    .data(d => d.displayLabel.split("\n").map((ln, i, arr) => ({ line: ln, i, total: arr.length })))
    .enter()
    .append("tspan")
    .attr("x", 0)
    .attr("dy", (d, i) => i === 0 ? `-${(d.total-1)*0.5}em` : "1em")
    .text(d => d.line);
}

// ============================================================
// UPDATE (applies state → visuals)
// ============================================================
const RIBBON_IDS = new Set(RIBBONS.map(r => r.id));
const RIBBON_MAP = new Map(RIBBONS.map(r => [r.id, r]));

function computeVisible() {
  const hidden = new Set(MATURITY_INFO[state.maturity].hiddenNodes);
  const relabels = MATURITY_INFO[state.maturity].nodeRelabels || {};
  const nodes = ALL_NODES
    .filter(n => n.maturity.includes(state.maturity))
    .filter(n => !hidden.has(n.id))
    .filter(n => state.typeFilters[n.type])
    .filter(n => state.visibleRings.has(n.ring))
    .map(n => ({ ...n, displayLabel: relabels[n.id] || n.label }));
  const nodeIds = new Set(nodes.map(n => n.id));
  // Edges are valid if both endpoints are either a visible node OR a ribbon virtual target.
  const endpointValid = (id) => nodeIds.has(id) || RIBBON_IDS.has(id);
  const edges = ALL_EDGES
    .filter(e => e.maturity.includes(state.maturity))
    .filter(e => endpointValid(e.source) && endpointValid(e.target));
  return { nodes, edges };
}

function update() {
  const { nodes, edges } = computeVisible();
  // Rebuild node map
  NODE_MAP.clear();
  nodes.forEach(n => NODE_MAP.set(n.id, n));

  renderEdges(edges);
  renderNodes(nodes);

  applySelection();
  applySearch();
  applyStageHighlight();
  updateMaturityDesc();
  updateRingList();

  // Re-render sidebar so it always reflects the current maturity
  if (state.selectedNode) updateDetails();
  else if (state.selectedRibbon) updateDetailsForRibbon(state.selectedRibbon);
}

function applySelection() {
  if (state.selectedNode) {
    const id = state.selectedNode;
    const relatedEdges = new Set();
    const relatedNodes = new Set([id]);
    const visibleEdgeData = edgeSel ? edgeSel.data() : [];
    visibleEdgeData.forEach(e => {
      if (e.source === id || e.target === id) {
        relatedEdges.add(e.id);
        relatedNodes.add(e.source);
        relatedNodes.add(e.target);
      }
    });
    ALL_EDGES.filter(e => e.maturity.includes(state.maturity)).forEach(e => {
      const isRibbonEdge = RIBBON_IDS.has(e.source) || RIBBON_IDS.has(e.target);
      if (isRibbonEdge && (e.source === id || e.target === id)) {
        relatedNodes.add(e.source);
        relatedNodes.add(e.target);
      }
    });
    // Clear all inline opacity first — dim class handles visual fade
    nodeSel.style("opacity", null);
    nodeSel.classed("highlight", d => d.id === id)
           .classed("dim", d => !relatedNodes.has(d.id));
    edgeSel.classed("highlight", d => relatedEdges.has(d.id))
           .classed("dim", d => !relatedEdges.has(d.id));
    edgeLabelSel.classed("visible", d => relatedEdges.has(d.id));
    ringSels.classed("dim", false);
    ribbonSels.classed("highlight", d => relatedNodes.has(d.id))
              .classed("dim", d => !relatedNodes.has(d.id));
  } else if (state.selectedRing !== null) {
    const ring = state.selectedRing;
    nodeSel.style("opacity", null).classed("highlight", false).classed("dim", false);
    edgeSel.classed("highlight", false).classed("dim", false);
    edgeLabelSel.classed("visible", false);
    ringSels.classed("highlight", d => d.id === ring).classed("dim", false);
    ribbonSels.classed("highlight", false).classed("dim", false);
  } else if (state.selectedRibbon) {
    const rid = state.selectedRibbon;
    const relatedEdges = new Set();
    const relatedNodes = new Set();
    const visibleEdgeDataR = edgeSel ? edgeSel.data() : [];
    visibleEdgeDataR.forEach(e => {
      if (e.source === rid || e.target === rid) {
        relatedEdges.add(e.id);
        if (e.source !== rid) relatedNodes.add(e.source);
        if (e.target !== rid) relatedNodes.add(e.target);
      }
    });
    nodeSel.style("opacity", null);
    nodeSel.classed("highlight", d => relatedNodes.has(d.id))
           .classed("dim", d => !relatedNodes.has(d.id));
    edgeSel.classed("highlight", d => relatedEdges.has(d.id))
           .classed("dim", d => !relatedEdges.has(d.id));
    edgeLabelSel.classed("visible", d => relatedEdges.has(d.id));
    ringSels.classed("highlight", false).classed("dim", false);
    ribbonSels.classed("highlight", d => d.id === rid).classed("dim", false);
  } else {
    nodeSel.style("opacity", null).classed("highlight", false).classed("dim", false);
    edgeSel.classed("highlight", false).classed("dim", false);
    edgeLabelSel.classed("visible", false);
    ringSels.classed("highlight", false).classed("dim", false);
    ribbonSels.classed("highlight", false).classed("dim", false);
  }
}

function applySearch() {
  if (!state.searchQuery) return;
  const q = state.searchQuery.toLowerCase();
  nodeSel.each(function(d) {
    const matches = d.displayLabel.toLowerCase().includes(q);
    d3.select(this).classed("dim", !matches);
    d3.select(this).classed("highlight", matches);
  });
}

function applyStageHighlight() {
  stageHighlightLayer.selectAll("*").remove();
  d3.selectAll(".quadrant-label")
    .classed("active", function() { return this.getAttribute("data-stage") === state.stage; });

  // Apply stage opacity only to ring-3 nodes that are NOT already dimmed
  // by a node/ribbon selection. Dimmed nodes use the CSS .dim class for fade.
  if (nodeSel) {
    nodeSel.filter(d => d.ring === 3).style("opacity", function(d) {
      if (d3.select(this).classed("dim")) return null; // let CSS handle it
      if (state.stage === "all") return null;           // no inline needed
      return d.stage === state.stage ? 1 : 0.25;
    });
  }

  if (state.stage === "all") return;

  const stageObj = STAGES.find(s => s.name === state.stage);
  if (!stageObj) return;
  const centerA = stageObj.angle * Math.PI / 180;
  const span = Math.PI / 2;
  const arcGen = d3.arc()
    .innerRadius(RINGS[0].radius)
    .outerRadius(RINGS[3].radius)
    .startAngle(centerA - span/2 + Math.PI/2)
    .endAngle(centerA + span/2 + Math.PI/2);
  stageHighlightLayer.append("path")
    .attr("class", "stage-highlight")
    .attr("d", arcGen())
    .attr("fill", "#C8F1DD"); // Niche Bright Green tint
}

function updateMaturityDesc() {
  document.getElementById("maturity-desc").textContent = MATURITY_INFO[state.maturity].description;
}

function updateRingList() {
  const container = document.getElementById("ring-list");
  container.innerHTML = "";

  // Click an active ring to deselect — "no selection" means no ring is highlighted.
  RINGS.forEach(r => {
    const row = document.createElement("label");
    row.className = "filter-row ring-row";
    const isSelected = state.selectedRing === r.id;
    row.innerHTML = `
      <input type="radio" name="ring-select" value="${r.id}" ${isSelected ? "checked" : ""}>
      <span>${r.name}</span>
    `;
    const input = row.querySelector("input");
    // Use click so we can detect re-clicks. At click-time, state.selectedRing
    // still holds the previous selection — compare to know whether to toggle off.
    input.addEventListener("click", () => {
      if (state.selectedRing === r.id) {
        input.checked = false;
        state.selectedNode = null;
        state.selectedRibbon = null;
        state.selectedRing = null;
        applySelection();
        clearSelection();
        updateRingList();
      } else {
        onRingClick(r.id);
        updateRingList();
      }
    });
    container.appendChild(row);
  });
}

// ============================================================
// INTERACTION HANDLERS
// ============================================================
function onNodeClick(id) {
  state.selectedRing = null;
  state.selectedRibbon = null;
  state.selectedNode = (state.selectedNode === id) ? null : id;
  applySelection();
  updateDetails();
}

function onRingClick(ringId) {
  state.selectedNode = null;
  state.selectedRibbon = null;
  state.selectedRing = ringId;
  applySelection();
  updateDetailsForRing(ringId);
  updateRingList();
}

function onRibbonClick(ribId) {
  state.selectedNode = null;
  state.selectedRing = null;
  state.selectedRibbon = (state.selectedRibbon === ribId) ? null : ribId;
  applySelection();
  if (state.selectedRibbon) updateDetailsForRibbon(ribId);
  else clearSelection();
}

function clearSelection() {
  state.selectedNode = null;
  state.selectedRing = null;
  state.selectedRibbon = null;
  applySelection(); // this now calls applyStageHighlight() internally
  document.getElementById("details-content").innerHTML = `
    <div class="empty-state">Click a node, ring, or ribbon to see its connections. Scroll to zoom, drag to pan.</div>`;
}

function updateDetailsForRibbon(ribId) {
  const el = document.getElementById("details-content");
  const rib = RIBBON_MAP.get(ribId);
  if (!rib) return;
  // Filter by current maturity
  const sources = ALL_EDGES.filter(e => e.target === ribId && e.maturity.includes(state.maturity));
  const quotesHtml = renderSidebarQuotes(ribId);

  el.innerHTML = `
    <div class="details-card">
      <h2>${rib.label}</h2>
      <div class="meta">Continuous activity · spans multiple journey phases</div>
      <div class="node-description">Admissions staff engage prospects, applicants, and admitted students through the full journey — no separate touchpoint per phase.</div>
      ${quotesHtml ? `<div class="section-title" style="margin-top:14px">Research quotes</div>${quotesHtml}` : ""}
      <div class="conn-toggle" id="conn-in-toggle">
        <span>Who feeds this activity (${sources.length})</span><span class="caret">▶</span>
      </div>
      <div class="conn-list" id="conn-in-list">
        ${renderConnList(sources, false)}
      </div>
    </div>
  `;

  const toggle = document.getElementById("conn-in-toggle");
  const list = document.getElementById("conn-in-list");
  if (toggle && list) {
    toggle.addEventListener("click", () => {
      toggle.classList.toggle("open");
      list.classList.toggle("open");
    });
  }
  wireQuoteClicks();
}
function getDisplayName(id) {
  const rib = RIBBON_MAP.get(id);
  if (rib) return rib.label;
  const n = NODE_MAP.get(id) || ALL_NODES.find(x => x.id === id);
  return n ? n.label.replace(/\n/g, " ") : id;
}

function renderSidebarQuotes(nodeId) {
  const q = NODE_QUOTES[nodeId];
  if (!q) return "";
  const tagLabels = { low: "Low Maturity", medium: "Medium Maturity", high: "High Maturity" };
  let html = "";
  ["low","medium","high"].forEach(m => {
    const text = q[m];
    if (!text || text.startsWith("N/A")) return;
    const isActive = m === state.maturity;
    const dimStyle = isActive ? "" : "opacity:0.4;cursor:pointer;";
    html += `<div class="quote-card ${m}" data-maturity="${m}" style="${dimStyle}">
      <span class="quote-tag ${m}">${tagLabels[m]}</span>
      <div class="quote-text">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
    </div>`;
  });
  return html;
}

function wireQuoteClicks() {
  document.querySelectorAll(".quote-card[data-maturity]").forEach(card => {
    const m = card.dataset.maturity;
    if (m === state.maturity) return;
    card.addEventListener("click", () => {
      // Switch maturity level
      state.maturity = m;
      document.querySelectorAll("#maturity-seg button").forEach(b => {
        b.classList.toggle("active", b.dataset.maturity === m);
      });
      update();
    });
  });
}

function renderConnList(edges, isOutgoing) {
  if (!edges.length) return `<ul><li><span class="empty-state">None</span></li></ul>`;
  return `<ul>${edges.map(e => {
    const nid = isOutgoing ? e.target : e.source;
    const name = getDisplayName(nid);
    const arrow = isOutgoing ? "→" : "←";
    const label = e.label ? ` <span class="edge-label">(${e.label})</span>` : "";
    return `<li>${arrow} ${name}${label}</li>`;
  }).join("")}</ul>`;
}

function wireConnToggles() {
  ["out","in"].forEach(dir => {
    const toggle = document.getElementById(`conn-${dir}-toggle`);
    const list = document.getElementById(`conn-${dir}-list`);
    if (toggle && list) {
      toggle.addEventListener("click", () => {
        toggle.classList.toggle("open");
        list.classList.toggle("open");
      });
    }
  });
}

function updateDetails() {
  const el = document.getElementById("details-content");
  if (!state.selectedNode) {
    el.innerHTML = `<div class="empty-state">Click a node or ring to see its connections.</div>`;
    return;
  }
  const node = ALL_NODES.find(n => n.id === state.selectedNode);
  if (!node) return;
  const relabels = MATURITY_INFO[state.maturity].nodeRelabels || {};
  const label = (relabels[node.id] || node.label).replace(/\n/g, " ");

  // Filter edges by current maturity
  const outgoing = ALL_EDGES.filter(e => e.source === node.id && e.maturity.includes(state.maturity));
  const incoming = ALL_EDGES.filter(e => e.target === node.id && e.maturity.includes(state.maturity));

  const ringName = RINGS[node.ring] ? RINGS[node.ring].name : "";
  const typeName = { person: "Person / Team", system: "System", touchpoint: "Touchpoint" }[node.type] || "";
  const description = NODE_DESCRIPTIONS[node.id] || "";
  const quotesHtml = renderSidebarQuotes(node.id);

  el.innerHTML = `
    <div class="details-card">
      <h2>${label}</h2>
      <div class="meta">${ringName} · ${typeName}${node.stage ? " · " + node.stage : ""}</div>
      ${description ? `<div class="node-description">${description}</div>` : ""}
      ${quotesHtml ? `<div class="section-title" style="margin-top:14px">Research quotes</div>${quotesHtml}` : ""}
      <div class="conn-toggle" id="conn-out-toggle">
        <span>Outgoing (${outgoing.length})</span><span class="caret">▶</span>
      </div>
      <div class="conn-list" id="conn-out-list">${renderConnList(outgoing, true)}</div>
      <div class="conn-toggle" id="conn-in-toggle">
        <span>Incoming (${incoming.length})</span><span class="caret">▶</span>
      </div>
      <div class="conn-list" id="conn-in-list">${renderConnList(incoming, false)}</div>
    </div>
  `;
  wireConnToggles();
  wireQuoteClicks();
}

function updateDetailsForRing(ringId) {
  const el = document.getElementById("details-content");
  const ring = RINGS[ringId];
  const { nodes } = computeVisible();
  const ringNodes = nodes.filter(n => n.ring === ringId);
  const typeCounts = { person: 0, system: 0, touchpoint: 0 };
  ringNodes.forEach(n => typeCounts[n.type]++);
  el.innerHTML = `
    <div class="details-card">
      <h2>${ring.name}</h2>
      <div class="meta">${ringNodes.length} nodes at ${state.maturity} maturity</div>
      <div class="section-title">Breakdown</div>
      <ul>
        ${typeCounts.person ? `<li><span>Person / Team</span><span class="edge-label">${typeCounts.person}</span></li>` : ""}
        ${typeCounts.system ? `<li><span>System</span><span class="edge-label">${typeCounts.system}</span></li>` : ""}
        ${typeCounts.touchpoint ? `<li><span>Touchpoint</span><span class="edge-label">${typeCounts.touchpoint}</span></li>` : ""}
      </ul>
      <div class="section-title">Nodes in this ring</div>
      <ul>
        ${ringNodes.map(n => `<li><span>${n.displayLabel.replace(/\n/g," ")}</span></li>`).join("")}
      </ul>
    </div>
  `;
}

// ============================================================
// TOOLTIP
// ============================================================
const tooltip = document.getElementById("tooltip");
function showTooltip(e, text) {
  tooltip.textContent = text;
  tooltip.classList.add("visible");
  tooltip.style.left = (e.clientX + 12) + "px";
  tooltip.style.top = (e.clientY + 12) + "px";
}
function hideTooltip() {
  tooltip.classList.remove("visible");
}

// ============================================================
// ZOOM / PAN
// ============================================================
const zoom = d3.zoom()
  .scaleExtent([0.05, 4])
  .on("zoom", (event) => {
    g.attr("transform", event.transform);
  });

svg.call(zoom).on("click", () => clearSelection());

function fitView() {
  const bbox = svg.node().getBoundingClientRect();
  const maxR = RINGS[3].radius + 750;  // include room for quadrant labels
  const scale = Math.min(bbox.width, bbox.height) / (maxR * 2) * 0.98;
  const tx = bbox.width / 2;
  const ty = bbox.height / 2;
  svg.transition().duration(500).call(
    zoom.transform,
    d3.zoomIdentity.translate(tx, ty).scale(scale)
  );
}

document.getElementById("zoom-in").onclick = () => svg.transition().call(zoom.scaleBy, 1.4);
document.getElementById("zoom-out").onclick = () => svg.transition().call(zoom.scaleBy, 1/1.4);
document.getElementById("zoom-reset").onclick = fitView;
document.getElementById("reset-all").onclick = () => {
  state.maturity = "medium";
  state.stage = "all";
  state.typeFilters = { person: true, system: true, touchpoint: true };
  state.searchQuery = "";
  state.visibleRings = new Set([0,1,2,3]);
  state.selectedRibbon = null;
  document.getElementById("search").value = "";
  document.querySelectorAll("#maturity-seg button").forEach(b =>
    b.classList.toggle("active", b.dataset.maturity === "medium"));
  document.querySelectorAll(".stage-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.stage === "all"));
  document.querySelectorAll("input[data-type]").forEach(i => i.checked = true);
  clearSelection();
  update();
  fitView();
};

// ============================================================
// CONTROL WIRING
// ============================================================
document.querySelectorAll("#maturity-seg button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("#maturity-seg button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    state.maturity = btn.dataset.maturity;
    update();
  });
});

function setStage(stageName) {
  state.stage = stageName;
  document.querySelectorAll(".stage-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.stage === stageName);
  });
  applyStageHighlight();
}

document.querySelectorAll(".stage-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const stageName = btn.dataset.stage;
    // Click an active stage to deselect — "no selection" === all stages.
    setStage(state.stage === stageName ? "all" : stageName);
  });
});

document.querySelectorAll("input[data-type]").forEach(input => {
  input.addEventListener("change", () => {
    state.typeFilters[input.dataset.type] = input.checked;
    update();
  });
});

document.getElementById("search").addEventListener("input", (e) => {
  state.searchQuery = e.target.value.trim();
  if (!state.searchQuery) {
    applySelection();
  } else {
    applySearch();
  }
});

// ============================================================
// INITIAL RENDER
// ============================================================
update();
window.addEventListener("load", fitView);
window.addEventListener("resize", () => { /* keep current transform */ });

</script>
</body>
</html>
